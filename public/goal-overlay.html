<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>개인 골 오버레이</title>
<style>
  :root {
    --bg: transparent;
    --panel: rgba(17, 24, 39, 0.85);
    --panel-weak: rgba(31, 41, 55, 0.75);
    --text: rgba(255, 255, 255, 0.92);
    --text-dim: rgba(255, 255, 255, 0.6);
    --text-strong: #ffffff;
    --radius: 12px;
    --pad-y: 8px;
    --pad-x: 12px;
    --gap: 10px;
    --bar-h: 10px;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg) !important; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); }
  .wrap {
    width: clamp(280px, 90vw, 480px);
    margin: 0 auto;
    padding: 12px;
  }
  .list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .item {
    background: var(--panel);
    border-radius: var(--radius);
    overflow: hidden;
    will-change: transform;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
  }
  .row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1.2fr);
    align-items: center;
    gap: 10px;
    padding: var(--pad-y) var(--pad-x);
  }
  .name {
    display: inline-flex;
    align-items: center;
    justify-content: flex-start;
    min-width: 72px;
    max-width: 120px;
    padding: 6px 12px;
    border-radius: 10px;
    border: 2px solid;
    color: var(--text-strong);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.5px;
    background: rgba(0, 0, 0, 0.25);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .remain {
    color: var(--text);
    font-weight: 700;
    font-size: 13px;
    text-align: center;
  }
  .stats {
    display: flex;
    align-items: baseline;
    gap: 8px;
    white-space: nowrap;
    justify-content: flex-end;
  }
  .pct {
    color: var(--text-dim);
    font-weight: 700;
    font-size: 12px;
  }
  .current {
    font-weight: 900;
    font-size: 16px;
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
  }
  .target {
    color: var(--text-dim);
    font-weight: 600;
    font-size: 12px;
  }
  .bar {
    height: var(--bar-h);
    background: var(--panel-weak);
    margin: 0 var(--pad-x) var(--pad-y);
    border-radius: 999px;
    overflow: hidden;
  }
  .fill {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    transition: width 600ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .mono {
    font-feature-settings: "tnum" 1, "lnum" 1;
    font-variant-numeric: tabular-nums lining-nums;
  }
  /* 세로형 방송 최적화 */
  @media (max-aspect-ratio: 9/16) {
    .wrap { width: clamp(240px, 85vw, 360px); padding: 8px; }
    .row { padding: 6px 10px; gap: 8px; }
    .name { min-width: 60px; padding: 4px 8px; font-size: 12px; }
    .remain { font-size: 12px; }
    .current { font-size: 14px; }
    .pct, .target { font-size: 11px; }
    .bar { height: 8px; margin: 0 10px 6px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="list" class="list"></div>
</div>
<script>
  const userData = [
    { id: "u1", name: "멤버1", current: 205600, target: 500000, color: "#f2c200" },
    { id: "u2", name: "멤버2", current: 235200, target: 500000, color: "#b166ff" },
    { id: "u3", name: "멤버3", current: 127100, target: 500000, color: "#ff5a9e" },
    { id: "u4", name: "멤버4", current: 89000, target: 300000, color: "#00d4aa" }
  ];

  const listEl = document.getElementById("list");
  const nodes = new Map();

  const format = (n) => Math.max(0, Math.round(n)).toLocaleString("ko-KR");
  const pct = (c, t) => (t > 0 ? Math.min(100, (c / t) * 100) : 0);
  const remain = (c, t) => Math.max(0, t - c);
  const byPercent = (a, b) => pct(b.current, b.target) - pct(a.current, a.target);

  function makeItem(u) {
    const item = document.createElement("div");
    item.className = "item";
    item.dataset.id = u.id;

    const row = document.createElement("div");
    row.className = "row";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = u.name;
    name.style.borderColor = u.color;

    const remainEl = document.createElement("div");
    remainEl.className = "remain mono";

    const stats = document.createElement("div");
    stats.className = "stats mono";
    const p = document.createElement("div");
    p.className = "pct";
    const c = document.createElement("div");
    c.className = "current";
    c.style.color = u.color;
    const t = document.createElement("div");
    t.className = "target";
    stats.appendChild(p);
    stats.appendChild(c);
    stats.appendChild(t);

    row.appendChild(name);
    row.appendChild(remainEl);
    row.appendChild(stats);

    const bar = document.createElement("div");
    bar.className = "bar";
    const fill = document.createElement("div");
    fill.className = "fill";
    fill.style.background = `linear-gradient(90deg, ${u.color}, rgba(255,255,255,0.9))`;
    bar.appendChild(fill);

    item.appendChild(row);
    item.appendChild(bar);

    return { item, name, remain: remainEl, p, c, t, fill };
  }

  function render() {
    const firstRects = new Map();
    for (const [id, n] of nodes) {
      firstRects.set(id, n.item.getBoundingClientRect());
    }

    userData.sort(byPercent);
    const fragment = document.createDocumentFragment();

    for (const u of userData) {
      let n = nodes.get(u.id);
      if (!n) {
        n = makeItem(u);
        nodes.set(u.id, n);
      }

      n.name.style.borderColor = u.color;
      n.c.style.color = u.color;
      n.remain.textContent = `남은 ${format(remain(u.current, u.target))}원`;
      const prog = pct(u.current, u.target);
      n.p.textContent = `${prog.toFixed(1)}%`;
      n.c.textContent = `${format(u.current)}`;
      n.t.textContent = `/ ${format(u.target)}`;
      n.fill.style.width = `${prog}%`;
      n.fill.style.background = `linear-gradient(90deg, ${u.color}, rgba(255,255,255,0.9))`;

      fragment.appendChild(n.item);
    }

    listEl.appendChild(fragment);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        for (const u of userData) {
          const n = nodes.get(u.id);
          const last = n.item.getBoundingClientRect();
          const first = firstRects.get(u.id);
          if (first) {
            const dy = first.top - last.top;
            if (Math.abs(dy) > 1) {
              n.item.style.transition = "none";
              n.item.style.transform = `translateY(${dy}px)`;
              n.item.offsetHeight;
              n.item.style.transition = "transform 500ms cubic-bezier(0.2, 0.7, 0.2, 1)";
              n.item.style.transform = "translateY(0)";
              const end = () => {
                n.item.style.transition = "";
                n.item.style.transform = "";
                n.item.removeEventListener("transitionend", end);
              };
              n.item.addEventListener("transitionend", end);
            }
          }
        }
      });
    });
  }

  /**
   * 실시간 데이터 업데이트 시뮬레이션
   * @param {string} id - 유저 ID
   * @param {number} amount - 현재 금액으로 설정 (0 ~ 목표액 사이로 클램프)
   */
  function updateData(id, amount) {
    const u = userData.find((x) => x.id === id);
    if (!u) return;
    u.current = Math.max(0, Math.min(u.target, amount));
    render();
  }

  /**
   * 현재 금액에 delta를 더함 (시뮬레이션용)
   */
  function addData(id, delta) {
    const u = userData.find((x) => x.id === id);
    if (!u) return;
    u.current = Math.max(0, Math.min(u.target, u.current + delta));
    render();
  }

  render();
  window.updateData = updateData;
  window.addData = addData;
  window.userData = userData;
</script>
</body>
</html>
