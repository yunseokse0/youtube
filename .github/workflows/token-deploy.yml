name: Deploy to Vercel with Token

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
        
      - name: Deploy to Vercel
        run: |
          echo "vcp_37XNeunD2DMkCzup6C8BF4fwQ692G8vW2WQv7EhcAnMTxBlFFB0R5NDw" | vercel login --token-stdin
          vercel --prod --yes --token=vcp_37XNeunD2DMkCzup6C8BF4fwQ692G8vW2WQv7EhcAnMTxBlFFB0R5NDw