name: Force Deploy to Vercel

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configure Git
        run: |
          git config --global user.email "yunseok.seo@gmail.com"
          git config --global user.name "yunseokse0"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
        
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope yunseokseos-projects
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --scope yunseokseos-projects
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --scope yunseokseos-projects